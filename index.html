<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Interactive Rating Component</title>
  </head>
  <body>
    <main id="card" class="rating-card">
      <div id="rating-content">
        <div class="icon">
          <img src="images/icon-star.svg" alt="Star icon">
        </div>

        <form>
          <fieldset>
            <legend class="main-text">How did we do?</legend>
            <p class="sub-text">Please let us know how we did with your support request. All feedback is appreciated to help us improve our offering!</p>

            <div id="radio-div">
              <input type="radio" name="rating" id="r1" value="1">
              <label for="r1">1</label>

              <input type="radio" name="rating" id="r2" value="2">
              <label for="r2">2</label>

              <input type="radio" name="rating" id="r3" value="3">
              <label for="r3">3</label>

              <input type="radio" name="rating" id="r4" value="4">
              <label for="r4">4</label>

              <input type="radio" name="rating" id="r5" value="5">
              <label for="r5">5</label>
            </div>
          </fieldset>

          <button type="submit" id="submit-btn">SUBMIT</button>
        </form>
      </div>

      <div id="thanks-content" hidden>
        <div class="icon">
          <img src="images/illustration-thank-you.svg" alt="Thank you illustration">
        </div>

        <p class="badge">You selected 4 out of 5</p>

        <div>
          <h1 class="main-text">Thank you!</h1>
          <p class="sub-text">We appreciate you taking the time to give a rating. If you ever need more support, don’t hesitate to get in touch!</p>
        </div>
      </div>
    </main>
  </body>
</html>
